name: CI

# Triggers: every push and every pull request targeting main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the requested Python version
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Cache pip dependencies to speed up subsequent runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      # 4. Install runtime and dev dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      # 5. Lint with flake8 — fail on any violation
      - name: Lint with flake8
        run: |
          flake8 seismotrack/ tests/ \
            --max-line-length=99 \
            --extend-ignore=E203

      # 6. Run the full test suite with coverage
      - name: Run tests with coverage
        run: |
          pytest --cov=seismotrack \
                 --cov-report=term-missing \
                 --cov-fail-under=90 \
                 -v

      # 7. Upload coverage report as artifact (available in the Actions UI)
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
